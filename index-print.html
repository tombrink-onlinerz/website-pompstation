     PRINT
     ============================================================ */
  @media print {
    *, *::before, *::after {
      -webkit-print-color-adjust: exact !important;

      animation-delay: -99s !important;
      animation-duration: .001s !important;
      animation-iteration-count: 1 !important;
      animation-fill-mode: both !important;
      animation-play-state: running !important;
      transition-duration: 0s !important;

    header[class*="fixed"],          /* sticky nav */
    .md\:hidden.fixed,               /* mobile sticky CTA */

    section { overflow: visible !important; }

    /* Hero — contain to one page, drop scroll cues */
    #top { height: 86vh !important; min-height: 0 !important; page-break-after: always; }

    /* Keep cards & structural blocks intact across page edges */
    #keuze article,
    #eten article,
    .card-lift { break-inside: avoid; }

    section { break-inside: avoid-page; }

    /* New page before the big sections so they don't split awkwardly */
    #eten { break-before: page; }
  }

  input[type="number"]::-webkit-outer-spin-button,

<script type="text/babel" data-presets="env,react">
  // Wait for React render + fonts + images, then open the print dialog.
  (async function autoPrint() {
    const waitForRoot = () => new Promise((resolve) => {
      const check = () => {
        const root = document.getElementById('root');
        if (root && root.querySelector('#top')) resolve();
        else setTimeout(check, 100);
      };
      check();
    });

    await waitForRoot();
    if (document.fonts && document.fonts.ready) {
      try { await document.fonts.ready; } catch (e) {}
    }
    // Wait for images to finish decoding
    const imgs = Array.from(document.images);
    await Promise.all(imgs.map(img => img.complete ? Promise.resolve()
      : new Promise(res => { img.onload = img.onerror = res; })));

    setTimeout(() => window.print(), 600);
  })();
</script>
